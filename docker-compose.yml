services:
  spy-options-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: spy-options-engine:local
    env_file:
      - path: .env
        required: false
    environment:
      TRADING_MODE: paper
      ENABLE_LIVE_ORDERS: "true"
      MARKET_DATA_ENABLED: ${MARKET_DATA_ENABLED:-true}
      STOCK_DATA_FEED: sip
      OPTION_DATA_FEED: opra
      KILL_SWITCH: ${KILL_SWITCH:-false}
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 8080
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
