services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: spy_options
      POSTGRES_USER: spy_options
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spy_options_local}
    volumes:
      - spy-options-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spy_options -d spy_options"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  spy-options-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: spy-options-engine:local
    env_file:
      - path: .env
        required: false
    environment:
      TRADING_MODE: paper
      ENABLE_LIVE_ORDERS: "true"
      MARKET_DATA_ENABLED: ${MARKET_DATA_ENABLED:-true}
      STOCK_DATA_FEED: sip
      OPTION_DATA_FEED: opra
      HISTORY_DATABASE_ENABLED: "true"
      MARKET_HISTORY_QUOTE_SAMPLE_MS: ${MARKET_HISTORY_QUOTE_SAMPLE_MS:-250}
      MARKET_HISTORY_RETENTION_DAYS: ${MARKET_HISTORY_RETENTION_DAYS:-7}
      DATABASE_URL: "postgresql://spy_options:${POSTGRES_PASSWORD:-spy_options_local}@postgres:5432/spy_options"
      KILL_SWITCH: ${KILL_SWITCH:-false}
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s

volumes:
  spy-options-postgres:
